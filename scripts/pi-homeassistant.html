<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pi Web Server</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #162033;
      --line: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(56,189,248,0.18), transparent 35%),
        linear-gradient(180deg, #020617, var(--bg));
      color: var(--text);
    }
    main {
      width: min(92vw, 720px);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(22, 32, 51, 0.92);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1;
    }
    p {
      margin: 8px 0;
      color: var(--muted);
      font-size: 1.05rem;
    }
    code {
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border: 1px solid #475569;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      background: #1e293b;
    }
    .button:hover {
      border-color: var(--accent);
      background: #243247;
    }
    .icon {
      width: 22px;
      height: 22px;
      color: var(--accent);
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pi Web Server</h1>
    <p>This static page is being served successfully.</p>
    <p>Host: <code>pi</code></p>
    <p>Path: <code>/home/jim/static-site/index.html</code></p>
    <div class="actions">
      <a class="button" href="http://pi:8123" id="ha-link">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 3.2 3 10v10.8h6.5v-6.4h5V20.8H21V10z"/>
        </svg>
        <span>Home Assistant</span>
      </a>
    </div>
  </main>
  <script>
    const haLink = document.getElementById("ha-link")
    if (haLink) {
      haLink.href = `${window.location.protocol}//${window.location.hostname}:8123`
    }
  </script>
</body>
</html>
