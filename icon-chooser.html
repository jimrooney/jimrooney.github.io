<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Chooser</title>
    <style>
      :root {
        --bg: #e8edf3;
        --panel: #ffffff;
        --ink: #10233a;
        --muted: #4b6078;
        --accent: #2f6fb0;
        --accent-2: #1f4a75;
        --ring: #8ab4e1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% 5%, #f5f9ff 0%, var(--bg) 45%, #d9e3ee 100%);
      }

      .wrap {
        width: min(980px, 95vw);
        margin: 24px auto;
        display: grid;
        gap: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid #c7d4e2;
        border-radius: 14px;
        padding: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      .muted {
        margin: 0;
        color: var(--muted);
      }

      .toolbar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
      }

      .toolbar-custom {
        display: none;
        grid-template-columns: 1fr 2fr;
        gap: 10px;
      }

      input,
      select {
        width: 100%;
        border: 1px solid #9db3ca;
        border-radius: 10px;
        padding: 9px 11px;
        font-size: 15px;
        background: #fff;
      }

      input:focus,
      select:focus {
        outline: 2px solid var(--ring);
        border-color: var(--accent);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 10px;
      }

      .card {
        border: 1px solid #bdd0e4;
        border-radius: 10px;
        background: #f7fbff;
        padding: 10px 8px;
        display: grid;
        place-items: center;
        gap: 6px;
        min-height: 90px;
        cursor: pointer;
      }

      .card:hover {
        border-color: var(--accent);
        background: #eef6ff;
      }

      .card.selected {
        border-color: var(--accent-2);
        background: #dfeeff;
        box-shadow: 0 0 0 2px #bcd7f4 inset;
      }

      .card img {
        width: 28px;
        height: 28px;
      }

      .name {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }

      .row {
        display: grid;
        grid-template-columns: 120px 1fr auto;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }

      .label {
        font-size: 13px;
        color: var(--muted);
      }

      .out {
        font-family: Consolas, "Courier New", monospace;
        font-size: 13px;
        background: #f5f8fb;
        border: 1px solid #ccdae8;
        border-radius: 8px;
        padding: 8px;
        overflow-x: auto;
        white-space: nowrap;
      }

      button {
        border: 1px solid #7fa7cc;
        background: linear-gradient(180deg, #4d89c4 0%, #2f6fb0 100%);
        color: #fff;
        border-radius: 8px;
        padding: 7px 10px;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <h1>Icon Chooser (Iconify Sources)</h1>
        <p class="muted">Pick an icon and copy either the ID or URL into your Google Sheet.</p>
      </section>

      <section class="panel toolbar">
        <select id="source" aria-label="Icon source">
          <option value="lucide">Lucide (outline)</option>
          <option value="mdi">Material Design Icons (filled)</option>
          <option value="heroicons-solid">Heroicons Solid (filled)</option>
          <option value="heroicons-outline">Heroicons Outline</option>
          <option value="fa6-solid">Font Awesome 6 Solid</option>
          <option value="fa6-regular">Font Awesome 6 Regular</option>
          <option value="fa6-brands">Font Awesome 6 Brands</option>
          <option value="material-symbols">Material Symbols</option>
          <option value="ion">Ionicons</option>
          <option value="solar-bold">Solar Bold</option>
          <option value="tabler">Tabler (outline)</option>
          <option value="custom">Custom Prefix</option>
        </select>
        <input id="search" type="text" placeholder="Search icons, e.g. plane, mail, clock" />
        <button id="clearBtn" type="button">Clear</button>
      </section>
      <section id="customRow" class="panel toolbar-custom">
        <input id="customPrefix" type="text" value="mdi" placeholder="Iconify prefix, e.g. mdi" />
        <input
          id="customNames"
          type="text"
          value="airplane,email,clock,calendar,home,map,compass,phone,camera,user,users"
          placeholder="Comma-separated icon names"
        />
      </section>

      <section id="grid" class="panel grid"></section>

      <section class="panel">
        <div class="row">
          <div class="label">Icon ID</div>
          <div id="idOut" class="out">lucide:plane</div>
          <button id="copyId" type="button">Copy ID</button>
        </div>
        <div class="row">
          <div class="label">Icon URL</div>
          <div id="urlOut" class="out">https://api.iconify.design/lucide:plane.svg</div>
          <button id="copyUrl" type="button">Copy URL</button>
        </div>
      </section>
    </main>

        },
        tabler: {
          label: "Tabler (outline)",
          names: [
            "plane",
            "plane-arrival",
            "plane-departure",
            "map",
            "compass",
            "wind",
            "cloud-sun",
            "calendar",
            "clock",
            "mail",
            "message",
            "phone",
            "world",
            "camera",
            "file-text",
            "clipboard-list",
            "book",
            "home",
            "settings",
            "tool",
            "folder",
            "link",
            "shield-check",
            "user",
            "users"
          ]
        }
      };

      const grid = document.getElementById("grid");
      const source = document.getElementById("source");
      const customRow = document.getElementById("customRow");
      const customPrefix = document.getElementById("customPrefix");
      const customNames = document.getElementById("customNames");
      const search = document.getElementById("search");
      const clearBtn = document.getElementById("clearBtn");
      const idOut = document.getElementById("idOut");
      const urlOut = document.getElementById("urlOut");
      const copyId = document.getElementById("copyId");
      const copyUrl = document.getElementById("copyUrl");

      let selectedSource = "lucide";
      let selectedName = "plane";

      function iconId(prefix, name) {
        return `${prefix}:${name}`;
      }

      function iconUrl(id) {
        return `https://api.iconify.design/${id}.svg`;
      }

      function currentPrefix() {
        if (selectedSource === "custom") {
          const prefix = customPrefix.value.trim();
          return prefix || "mdi";
        }
        return selectedSource;
      }

      function currentNames() {
        if (selectedSource === "custom") {
          return customNames.value
            .split(",")
            .map((n) => n.trim())
            .filter(Boolean);
        }
        return iconSets[selectedSource].names;
      }

      function selectedId() {
        return iconId(currentPrefix(), selectedName);
      }

      function setSelection(name) {
        selectedName = name;
        source.value = selectedSource;
        idOut.textContent = selectedId();
        urlOut.textContent = iconUrl(selectedId());
      }

      function render(filterText = "") {
        const q = filterText.trim().toLowerCase();
        const names = currentNames();
        if (!names.length) {
          grid.innerHTML = "<div class='name'>No icons for this source/list yet.</div>";
          return;
        }
        if (!names.includes(selectedName)) {
          selectedName = names[0];
        }
        const list = names.filter((n) => n.includes(q));
        const prefix = currentPrefix();
        grid.innerHTML = "";
        idOut.textContent = selectedId();
        urlOut.textContent = iconUrl(selectedId());
        list.forEach((name) => {
          const id = iconId(prefix, name);
          const card = document.createElement("button");
          card.type = "button";
          card.className = `card${name === selectedName ? " selected" : ""}`;
          card.innerHTML = `<img src="${iconUrl(id)}" alt="${name}" /><div class="name">${name}</div>`;
          card.addEventListener("click", () => {
            setSelection(name);
            render(search.value);
          });
          grid.appendChild(card);
        });
      }

      async function copyText(text, el, doneText) {
        const original = el.textContent;
        try {
          await navigator.clipboard.writeText(text);
          el.textContent = doneText;
          setTimeout(() => (el.textContent = original), 900);
        } catch (_) {
          alert("Clipboard copy failed. You can still manually copy from the field.");
        }
      }

      source.addEventListener("change", (e) => {
        selectedSource = e.target.value;
        customRow.style.display = selectedSource === "custom" ? "grid" : "none";
        selectedName = currentNames()[0] || "";
        setSelection(selectedName);
        render(search.value);
      });
      customPrefix.addEventListener("input", () => render(search.value));
      customNames.addEventListener("input", () => {
        selectedName = currentNames()[0] || "";
        render(search.value);
      });
      search.addEventListener("input", (e) => render(e.target.value));
      clearBtn.addEventListener("click", () => {
        search.value = "";
        render("");
      });
      copyId.addEventListener("click", () => copyText(selectedId(), copyId, "Copied"));
      copyUrl.addEventListener("click", () => copyText(iconUrl(selectedId()), copyUrl, "Copied"));

      customRow.style.display = "none";
      setSelection(selectedName);
      render();
    </script>

</html>
