<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Chooser</title>
    <style>
      :root {
        --bg: #e8edf3;
        --panel: #ffffff;
        --ink: #10233a;
        --muted: #4b6078;
        --accent: #2f6fb0;
        --accent-2: #1f4a75;
        --ring: #8ab4e1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% 5%, #f5f9ff 0%, var(--bg) 45%, #d9e3ee 100%);
      }

      .wrap {
        width: min(980px, 95vw);
        margin: 24px auto;
        display: grid;
        gap: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid #c7d4e2;
        border-radius: 14px;
        padding: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }

      .muted {
        margin: 0;
        color: var(--muted);
      }

      .toolbar {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
      }

      .toolbar-live {
        display: grid;
        grid-template-columns: auto 1fr auto auto auto;
        gap: 10px;
        align-items: center;
      }

      .status {
        font-size: 13px;
        color: var(--muted);
      }

      .pager {
        font-size: 13px;
        color: var(--muted);
        min-width: 98px;
        text-align: center;
      }

      input,
      select {
        width: 100%;
        border: 1px solid #9db3ca;
        border-radius: 10px;
        padding: 9px 11px;
        font-size: 15px;
        background: #fff;
      }

      input:focus,
      select:focus {
        outline: 2px solid var(--ring);
        border-color: var(--accent);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 10px;
      }

      .card {
        border: 1px solid #bdd0e4;
        border-radius: 10px;
        background: #f7fbff;
        padding: 10px 8px;
        display: grid;
        place-items: center;
        gap: 6px;
        min-height: 90px;
        cursor: pointer;
      }

      .card:hover {
        border-color: var(--accent);
        background: #eef6ff;
      }

      .card.selected {
        border-color: var(--accent-2);
        background: #dfeeff;
        box-shadow: 0 0 0 2px #bcd7f4 inset;
      }

      .card img {
        width: 28px;
        height: 28px;
      }

      .name {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }

      .row {
        display: grid;
        grid-template-columns: 120px 1fr auto;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }

      .label {
        font-size: 13px;
        color: var(--muted);
      }

      .out {
        font-family: Consolas, "Courier New", monospace;
        font-size: 13px;
        background: #f5f8fb;
        border: 1px solid #ccdae8;
        border-radius: 8px;
        padding: 8px;
        overflow-x: auto;
        white-space: nowrap;
      }

      button {
        border: 1px solid #7fa7cc;
        background: linear-gradient(180deg, #4d89c4 0%, #2f6fb0 100%);
        color: #fff;
        border-radius: 8px;
        padding: 7px 10px;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <h1>Icon Chooser (Iconify Sources)</h1>
        <p class="muted">Pick an icon and copy either the ID or URL into your Google Sheet.</p>
      </section>

      <section class="panel toolbar">
        <select id="source" aria-label="Icon source">
          <option value="mdi">Material Design Icons (mdi)</option>
          <option value="lucide">Lucide</option>
          <option value="heroicons-solid">Heroicons Solid</option>
          <option value="heroicons-outline">Heroicons Outline</option>
          <option value="tabler">Tabler</option>
          <option value="fa6-solid">Font Awesome 6 Solid</option>
          <option value="material-symbols">Material Symbols</option>
          <option value="ion">Ionicons</option>
          <option value="ph">Phosphor (ph)</option>
        </select>
        <input id="search" type="text" placeholder="Search icons, e.g. plane, mail, clock" />
        <button id="clearBtn" type="button">Clear</button>
      </section>
      <section class="panel toolbar-live">
        <button id="prevPage" type="button">Previous</button>
        <label><input id="fullSet" type="checkbox" checked /> Use full icon library for selected source</label>
        <div id="status" class="status"></div>
        <div id="pageInfo" class="pager">Page 1 / 1</div>
        <button id="nextPage" type="button">Next</button>
      </section>

      <section id="grid" class="panel grid"></section>

      <section class="panel">
        <div class="row">
          <div class="label">Icon ID</div>
          <div id="idOut" class="out">mdi:airplane</div>
          <button id="copyId" type="button">Copy ID</button>
        </div>
        <div class="row">
          <div class="label">Icon URL</div>
          <div id="urlOut" class="out">https://api.iconify.design/mdi:airplane.svg</div>
          <button id="copyUrl" type="button">Copy URL</button>
        </div>
      </section>
    </main>

    <script>
      const iconSets = {
        mdi: {
          label: "Material Design Icons (mdi)",
          names: [
            "airplane",
            "map",
            "compass",
            "weather-windy",
            "clock",
            "calendar",
            "email",
            "phone",
            "camera",
            "folder",
            "link-variant",
            "shield-check",
            "account",
            "account-group",
            "home",
            "cog"
          ]
        },
        lucide: {
          label: "Lucide",
          names: [
            "plane",
            "map",
            "compass",
            "wind",
            "calendar",
            "clock-3",
            "mail",
            "phone",
            "camera",
            "folder",
            "link",
            "shield-check",
            "user"
          ]
        },
        "heroicons-solid": {
          label: "Heroicons Solid",
          names: [
            "paper-airplane",
            "map",
            "compass",
            "clock",
            "calendar-days",
            "envelope",
            "phone",
            "camera",
            "folder",
            "link",
            "shield-check",
            "user"
          ]
        },
        "heroicons-outline": {
          label: "Heroicons Outline",
          names: [
            "paper-airplane",
            "map",
            "compass",
            "clock",
            "calendar-days",
            "envelope",
            "phone",
            "camera",
            "folder",
            "link",
            "shield-check",
            "user"
          ]
        },
        tabler: {
          label: "Tabler",
          names: [
            "plane",
            "map",
            "compass",
            "wind",
            "clock",
            "calendar",
            "mail",
            "phone",
            "camera",
            "folder",
            "link",
            "shield-check"
          ]
        },
        "fa6-solid": {
          label: "Font Awesome 6 Solid",
          names: [
            "plane",
            "map-location-dot",
            "compass",
            "clock",
            "calendar-days",
            "envelope",
            "phone",
            "camera",
            "folder",
            "link",
            "shield-halved",
            "user"
          ]
        },
        "material-symbols": {
          label: "Material Symbols",
          names: [
            "flight",
            "map",
            "explore",
            "schedule",
            "calendar_month",
            "mail",
            "call",
            "photo_camera",
            "folder",
            "link",
            "verified_user",
            "person"
          ]
        },
        ion: {
          label: "Ionicons",
          names: [
            "airplane",
            "map",
            "compass",
            "time",
            "calendar",
            "mail",
            "call",
            "camera",
            "folder",
            "link",
            "shield-checkmark",
            "person"
          ]
        },
        ph: {
          label: "Phosphor (ph)",
          names: [
            "airplane-in-flight-bold",
            "map-pin-bold",
            "compass-bold",
            "clock-bold",
            "calendar",
            "envelope-simple-bold",
            "phone-bold",
            "camera-bold",
            "folder-bold",
            "link-bold",
            "shield-check-bold",
            "user-bold"
          ]
        }
      };

      const grid = document.getElementById("grid");
      const source = document.getElementById("source");
      const fullSet = document.getElementById("fullSet");
      const status = document.getElementById("status");
      const prevPage = document.getElementById("prevPage");
      const nextPage = document.getElementById("nextPage");
      const pageInfo = document.getElementById("pageInfo");
      const search = document.getElementById("search");
      const clearBtn = document.getElementById("clearBtn");
      const idOut = document.getElementById("idOut");
      const urlOut = document.getElementById("urlOut");
      const copyId = document.getElementById("copyId");
      const copyUrl = document.getElementById("copyUrl");

      let selectedSource = "mdi";
      let selectedName = "airplane";
      let renderToken = 0;
      const pageSize = 120;
      let currentPage = 0;
      const collectionCache = new Map();

      function iconId(prefix, name) {
        return `${prefix}:${name}`;
      }

      function iconUrl(id) {
        return `https://api.iconify.design/${id}.svg`;
      }

      function currentPrefix() {
        return selectedSource;
      }

      function currentNames() {
        return iconSets[selectedSource].names;
      }

      async function loadCollectionNames(prefix) {
        if (collectionCache.has(prefix)) return collectionCache.get(prefix);
        try {
          const res = await fetch(`https://api.iconify.design/collection?prefix=${encodeURIComponent(prefix)}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const names = [];
          Object.values(data).forEach((value) => {
            if (Array.isArray(value)) {
              value.forEach((name) => {
                if (typeof name === "string") names.push(name);
              });
            }
          });
          const unique = Array.from(new Set(names));
          collectionCache.set(prefix, unique);
          return unique;
        } catch (_) {
          collectionCache.set(prefix, []);
          return [];
        }
      }

      function selectedId() {
        return iconId(currentPrefix(), selectedName);
      }

      function setSelection(name) {
        selectedName = name;
        source.value = selectedSource;
        idOut.textContent = selectedId();
        urlOut.textContent = iconUrl(selectedId());
      }

      async function render(filterText = "") {
        const token = ++renderToken;
        const q = filterText.trim().toLowerCase();
        const prefix = currentPrefix();
        let names = currentNames();
        if (fullSet.checked) {
          status.textContent = `Loading ${prefix} library...`;
          const fullNames = await loadCollectionNames(prefix);
          if (token !== renderToken) return;
          if (fullNames.length) {
            names = fullNames;
            status.textContent = `${prefix}: ${fullNames.length} icons`;
          } else {
            status.textContent = `Could not load full ${prefix} library. Using curated list.`;
          }
        } else {
          status.textContent = `Using curated list (${names.length} icons).`;
        }
        if (!names.length) {
          grid.innerHTML = "<div class='name'>No icons for this source/list yet.</div>";
          return;
        }
        if (!names.includes(selectedName)) {
          selectedName = names[0];
        }
        const filtered = names.filter((n) => n.includes(q));
        const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
        if (currentPage >= totalPages) currentPage = totalPages - 1;
        if (currentPage < 0) currentPage = 0;
        const start = currentPage * pageSize;
        const list = filtered.slice(start, start + pageSize);
        grid.innerHTML = "";
        idOut.textContent = selectedId();
        urlOut.textContent = iconUrl(selectedId());
        pageInfo.textContent = `Page ${currentPage + 1} / ${totalPages}`;
        prevPage.disabled = currentPage === 0;
        nextPage.disabled = currentPage >= totalPages - 1;
        if (!list.length) {
          grid.innerHTML = "<div class='name'>No matches. Try a different search term.</div>";
          return;
        }
        list.forEach((name) => {
          const id = iconId(prefix, name);
          const card = document.createElement("button");
          card.type = "button";
          card.className = `card${name === selectedName ? " selected" : ""}`;
          card.innerHTML = `<img src="${iconUrl(id)}" alt="${name}" /><div class="name">${name}</div>`;
          card.addEventListener("click", () => {
            setSelection(name);
            render(search.value);
          });
          grid.appendChild(card);
        });
      }

      async function copyText(text, el, doneText) {
        const original = el.textContent;
        try {
          await navigator.clipboard.writeText(text);
          el.textContent = doneText;
          setTimeout(() => (el.textContent = original), 900);
        } catch (_) {
          alert("Clipboard copy failed. You can still manually copy from the field.");
        }
      }

      source.addEventListener("change", (e) => {
        selectedSource = e.target.value;
        selectedName = currentNames()[0] || "";
        currentPage = 0;
        setSelection(selectedName);
        render(search.value);
      });
      fullSet.addEventListener("change", () => {
        currentPage = 0;
        render(search.value);
      });
      search.addEventListener("input", (e) => {
        currentPage = 0;
        render(e.target.value);
      });
      clearBtn.addEventListener("click", () => {
        search.value = "";
        currentPage = 0;
        render("");
      });
      prevPage.addEventListener("click", () => {
        currentPage -= 1;
        render(search.value);
      });
      nextPage.addEventListener("click", () => {
        currentPage += 1;
        render(search.value);
      });
      copyId.addEventListener("click", () => copyText(selectedId(), copyId, "Copied"));
      copyUrl.addEventListener("click", () => copyText(iconUrl(selectedId()), copyUrl, "Copied"));

      setSelection(selectedName);
      render();
    </script>
  </body>
</html>
