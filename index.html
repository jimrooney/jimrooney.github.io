<html>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <body>
    <link rel="stylesheet" href="styles.css" />
    <script>
      const root = {}
    </script>
    <center>
    <div id="MyHeader" class="MyHeader">
      <div class="header-title">JimRooney.com</div>
      <div class="header-subtitle">Welcome to the house of Jim</div>
    </div>

    <script src="sheets.js"></script>

    <div id="LinkContainer"></div>
    <div class="editor-bar">
      <button id="editModeToggle" class="editor-btn" type="button">Edit Mode: Off</button>
      <button id="editorConfigBtn" class="editor-btn" type="button" hidden>Configure Save API</button>
      <button id="addLinkBtn" class="editor-btn" type="button" hidden>Add Button</button>
      <span id="editorStatus" class="editor-status"></span>
    </div>
    <div id="iconModal" class="icon-modal hidden" role="dialog" aria-modal="true" aria-labelledby="iconModalTitle">
      <div class="icon-modal-content">
        <h3 id="iconModalTitle">Choose Icon</h3>
        <p id="iconModalSub" class="icon-modal-sub"></p>
        <div class="icon-edit-row">
          <label for="iconLabelInput">Label</label>
          <input id="iconLabelInput" type="text" placeholder="Button label" />
          <button id="iconSaveLabelBtn" class="editor-btn" type="button">Save Label</button>
        </div>
        <div class="icon-edit-row">
          <label for="iconHrefInput">Link</label>
          <input id="iconHrefInput" type="text" placeholder="https://example.com" />
          <button id="iconSaveHrefBtn" class="editor-btn" type="button">Save Link</button>
        </div>
        <div class="icon-search-row">
          <select id="iconSetSelect" aria-label="Icon set">
            <option value="mdi">Material Design Icons (mdi)</option>
            <option value="lucide">Lucide</option>
            <option value="heroicons-solid">Heroicons Solid</option>
            <option value="heroicons-outline">Heroicons Outline</option>
            <option value="tabler">Tabler</option>
            <option value="fa6-solid">Font Awesome 6 Solid</option>
            <option value="material-symbols">Material Symbols</option>
            <option value="ion">Ionicons</option>
            <option value="ph">Phosphor (ph)</option>
          </select>
          <input id="iconSearchInput" type="text" placeholder="Search full icon set (example: plane or heroicons-solid:camera)" />
          <span id="iconSearchStatus" class="icon-search-status"></span>
        </div>
        <div id="iconChoices" class="icon-choices"></div>
        <div class="icon-modal-actions">
          <a class="icon-chooser-link" href="icon-chooser.html" target="_blank" rel="noopener noreferrer">Open full icon chooser</a>
          <button id="iconClearBtn" class="editor-btn" type="button">Clear Icon</button>
          <button id="iconCancelBtn" class="editor-btn" type="button">Cancel</button>
        </div>
      </div>
    </div>
    <!-- Navbar takes the data loaded by root (from the google spreadsheet) and loops over it making links -->
    <script>
      // Navbar + edit mode
      const editorState = {
        enabled: false,
        endpoint: localStorage.getItem("iconEditorEndpoint") || "",
        token: localStorage.getItem("iconEditorToken") || "",
        sheetName: "Links",
        targetAnchor: null
      }

      const curatedIconsBySet = {
        mdi: [
          "mdi:airplane",
          "mdi:map",
          "mdi:compass",
          "mdi:weather-windy",
          "mdi:clock",
          "mdi:calendar",
          "mdi:email",
          "mdi:phone",
          "mdi:camera",
          "mdi:folder",
          "mdi:link-variant",
          "mdi:shield-check",
          "mdi:account",
          "mdi:account-group",
          "mdi:home",
          "mdi:cog"
        ],
        lucide: [
          "lucide:plane",
          "lucide:map",
          "lucide:compass",
          "lucide:wind",
          "lucide:clock-3",
          "lucide:calendar",
          "lucide:mail",
          "lucide:phone",
          "lucide:camera",
          "lucide:folder",
          "lucide:link",
          "lucide:shield-check"
        ],
        "heroicons-solid": [
          "heroicons-solid:paper-airplane",
          "heroicons-solid:map",
          "heroicons-solid:compass",
          "heroicons-solid:clock",
          "heroicons-solid:calendar-days",
          "heroicons-solid:envelope",
          "heroicons-solid:phone",
          "heroicons-solid:camera",
          "heroicons-solid:folder",
          "heroicons-solid:link",
          "heroicons-solid:shield-check",
          "heroicons-solid:user"
        ],
        "heroicons-outline": [
          "heroicons-outline:paper-airplane",
          "heroicons-outline:map",
          "heroicons-outline:compass",
          "heroicons-outline:clock",
          "heroicons-outline:calendar-days",
          "heroicons-outline:envelope",
          "heroicons-outline:phone",
          "heroicons-outline:camera",
          "heroicons-outline:folder",
          "heroicons-outline:link",
          "heroicons-outline:shield-check",
          "heroicons-outline:user"
        ],
        tabler: [
          "tabler:plane",
          "tabler:map",
          "tabler:compass",
          "tabler:wind",
          "tabler:clock",
          "tabler:calendar",
          "tabler:mail",
          "tabler:phone",
          "tabler:camera",
          "tabler:folder",
          "tabler:link",
          "tabler:shield-check"
        ],
        "fa6-solid": [
          "fa6-solid:plane",
          "fa6-solid:map-location-dot",
          "fa6-solid:compass",
          "fa6-solid:clock",
          "fa6-solid:calendar-days",
          "fa6-solid:envelope",
          "fa6-solid:phone",
          "fa6-solid:camera",
          "fa6-solid:folder",
          "fa6-solid:link",
          "fa6-solid:shield-halved",
          "fa6-solid:user"
        ],
        "material-symbols": [
          "material-symbols:flight",
          "material-symbols:map",
          "material-symbols:explore",
          "material-symbols:schedule",
          "material-symbols:calendar_month",
          "material-symbols:mail",
          "material-symbols:call",
          "material-symbols:photo_camera",
          "material-symbols:folder",
          "material-symbols:link",
          "material-symbols:verified_user",
          "material-symbols:person"
        ],
        ion: [
          "ion:airplane",
          "ion:map",
          "ion:compass",
          "ion:time",
          "ion:calendar",
          "ion:mail",
          "ion:call",
          "ion:camera",
          "ion:folder",
          "ion:link",
          "ion:shield-checkmark",
          "ion:person"
        ],
        ph: [
          "ph:airplane-in-flight-bold",
          "ph:map-pin-bold",
          "ph:compass-bold",
          "ph:clock-bold",
          "ph:calendar-bold",
          "ph:envelope-simple-bold",
          "ph:phone-bold",
          "ph:camera-bold",
          "ph:folder-bold",
          "ph:link-bold",
          "ph:shield-check-bold",
          "ph:user-bold"
        ]
      }

      const esc = (value) =>
        String(value ?? "").replace(/[&<>"']/g, (char) => {
          const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }
          return map[char]
        })

      const iconMarkupFor = (iconValue, label) => {
        const icon = String(iconValue ?? "").trim()
        if (!icon) return ""
        const src = icon.includes(":")
          ? `https://api.iconify.design/${encodeURIComponent(icon)}.svg`
          : icon
        return `<span class="icon-wrap" style="display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;"><img class="nav-icon" src="${esc(src)}" alt="" style="width:clamp(18px,6vw,32px);height:clamp(18px,6vw,32px);display:block;" /><span class="icon-label" style="font-size:10px;line-height:1;display:block;">${esc(label)}</span></span>`
      }

      const iconAnchorStyle =
        "display:inline-flex;align-items:center;justify-content:center;min-width:clamp(40px,8vw,58px);padding:4px 5px;line-height:1;text-shadow:none;text-decoration:none;white-space:nowrap;"

      const statusEl = document.getElementById("editorStatus")
      const linksRoot = document.getElementById("LinkContainer")
      const editModeToggle = document.getElementById("editModeToggle")
      const editorConfigBtn = document.getElementById("editorConfigBtn")
      const addLinkBtn = document.getElementById("addLinkBtn")
      const iconModal = document.getElementById("iconModal")
      const iconModalSub = document.getElementById("iconModalSub")
      const iconSetSelect = document.getElementById("iconSetSelect")
      const iconSearchInput = document.getElementById("iconSearchInput")
      const iconSearchStatus = document.getElementById("iconSearchStatus")
      const iconLabelInput = document.getElementById("iconLabelInput")
      const iconSaveLabelBtn = document.getElementById("iconSaveLabelBtn")
      const iconHrefInput = document.getElementById("iconHrefInput")
      const iconSaveHrefBtn = document.getElementById("iconSaveHrefBtn")
      const iconChoices = document.getElementById("iconChoices")
      const iconClearBtn = document.getElementById("iconClearBtn")
      const iconCancelBtn = document.getElementById("iconCancelBtn")
      let iconSearchTimer = null
      let iconSearchToken = 0
      let selectedIconSet = "mdi"
      let draggedNav = null
      let dropTargetNav = null
      let suppressEditClickUntil = 0
      let longPressTimer = null
      let longPressStartX = 0
      let longPressStartY = 0
      let touchDragPointerId = null
      let touchDraggedNav = null
      let touchDragStarted = false
      let touchDragStartX = 0
      let touchDragStartY = 0
      const LONG_PRESS_MS = 550
      const LONG_PRESS_MOVE_THRESHOLD = 12
      const TOUCH_DRAG_THRESHOLD = 10

      editorConfigBtn.hidden = !editorState.enabled
      addLinkBtn.hidden = !editorState.enabled

      const setStatus = (text) => {
        statusEl.textContent = text
      }

      const normalizeHref = (hrefRaw) => {
        const trimmed = String(hrefRaw || "").trim()
        if (!trimmed) return ""
        return /^[a-zA-Z][a-zA-Z\d+\-.]*:/.test(trimmed) ? trimmed : `https://${trimmed}`
      }

      const reloadLinksFromSheet = () => {
        if (typeof myDataLoader?.load === "function") {
          myDataLoader.load()
        }
      }

      const ensureEditorApiConfigured = () => {
        if (editorState.endpoint && editorState.token) return true
        configureEditorApi()
        return Boolean(editorState.endpoint && editorState.token)
      }

      const setDraggableState = () => {
        linksRoot.querySelectorAll(".Nav").forEach((item) => {
          item.draggable = editorState.enabled
        })
        linksRoot.querySelectorAll("a.BlueBox").forEach((anchor) => {
          anchor.draggable = false
        })
      }

      const setEditMode = (enabled) => {
        editorState.enabled = Boolean(enabled)
        document.body.classList.toggle("edit-mode", editorState.enabled)
        editModeToggle.textContent = editorState.enabled ? "Edit Mode: On" : "Edit Mode: Off"
        editorConfigBtn.hidden = !editorState.enabled
        addLinkBtn.hidden = !editorState.enabled
        setDraggableState()
      }

      const clearLongPressTimer = () => {
        if (longPressTimer) clearTimeout(longPressTimer)
        longPressTimer = null
      }

      const configureEditorApi = () => {
        const endpoint = prompt("Apps Script Web App URL", editorState.endpoint)
        if (endpoint === null) return
        const token = prompt("Shared token (must match Apps Script)", editorState.token)
        if (token === null) return
        editorState.endpoint = endpoint.trim()
        editorState.token = token.trim()
        localStorage.setItem("iconEditorEndpoint", editorState.endpoint)
        localStorage.setItem("iconEditorToken", editorState.token)
        setStatus(editorState.endpoint ? "Save API configured." : "Save API not set.")
      }

      const applyIconToAnchor = (anchor, icon) => {
        const label = anchor.dataset.label || anchor.textContent.trim()
        const iconMarkup = iconMarkupFor(icon, label)
        if (iconMarkup) {
          anchor.classList.add("icon-only")
          anchor.style.cssText = iconAnchorStyle
          anchor.innerHTML = iconMarkup
          anchor.dataset.icon = icon
        } else {
          anchor.classList.remove("icon-only")
          anchor.style.cssText = ""
          anchor.textContent = label
          anchor.dataset.icon = ""
        }
      }

      const applyLabelToAnchor = (anchor, label) => {
        const nextLabel = String(label || "").trim()
        if (!nextLabel) return
        anchor.dataset.label = nextLabel
        anchor.title = nextLabel
        anchor.setAttribute("aria-label", nextLabel)
        applyIconToAnchor(anchor, anchor.dataset.icon || "")
        if (editorState.targetAnchor === anchor) {
          iconModalSub.textContent = `Editing: ${nextLabel}`
        }
      }

      const saveIconToSheet = async (anchor, icon) => {
        if (!ensureEditorApiConfigured()) {
          setStatus("Save cancelled. API not configured.")
          return
        }

        const row = Number(anchor.dataset.sheetRow)
        const payload = {
          action: "set_icon",
          token: editorState.token,
          sheet: editorState.sheetName,
          row: row,
          icon: icon || ""
        }

        setStatus("Saving icon...")
        try {
          const response = await fetch(editorState.endpoint, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          })
          const data = await response.json()
          if (!response.ok || !data.ok) {
            throw new Error(data.error || `HTTP ${response.status}`)
          }
          applyIconToAnchor(anchor, icon)
          setStatus("Saved to Google Sheet.")
        } catch (error) {
          setStatus(`Save failed: ${error.message}`)
        }
      }

      const saveLabelToSheet = async (anchor, label) => {
        if (!ensureEditorApiConfigured()) {
          setStatus("Save cancelled. API not configured.")
          return
        }

        const row = Number(anchor.dataset.sheetRow)
        const cleanLabel = String(label || "").trim()
        if (!cleanLabel) {
          setStatus("Label cannot be empty.")
          return
        }

        const payload = {
          action: "set_label",
          token: editorState.token,
          sheet: editorState.sheetName,
          row: row,
          label: cleanLabel
        }

        setStatus("Saving label...")
        try {
          await callEditorApi(payload)
          applyLabelToAnchor(anchor, cleanLabel)
          setStatus("Label saved to Google Sheet.")
          closeModal()
        } catch (error) {
          if (/unsupported action/i.test(error.message) || /set_label/i.test(error.message)) {
            setStatus("Save failed: Apps Script must support action 'set_label'.")
            return
          }
          setStatus(`Save failed: ${error.message}`)
        }
      }

      const saveHrefToSheet = async (anchor, hrefRaw) => {
        if (!ensureEditorApiConfigured()) {
          setStatus("Save cancelled. API not configured.")
          return
        }

        const row = Number(anchor.dataset.sheetRow)
        const cleanHref = normalizeHref(hrefRaw)
        if (!cleanHref) {
          setStatus("Link cannot be empty.")
          return
        }

        const payload = {
          action: "set_href",
          token: editorState.token,
          sheet: editorState.sheetName,
          row: row,
          href: cleanHref
        }

        setStatus("Saving link...")
        try {
          await callEditorApi(payload)
          anchor.setAttribute("href", cleanHref)
          iconHrefInput.value = cleanHref
          setStatus("Link saved to Google Sheet.")
          closeModal()
        } catch (error) {
          if (/unsupported action/i.test(error.message) || /set_href/i.test(error.message)) {
            setStatus("Save failed: Apps Script must support action 'set_href'.")
            return
          }
          setStatus(`Save failed: ${error.message}`)
        }
      }

      const callEditorApi = async (payload) => {
        const response = await fetch(editorState.endpoint, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        })
        const data = await response.json()
        if (!response.ok || !data.ok) {
          throw new Error(data.error || `HTTP ${response.status}`)
        }
        return data
      }

      const deleteLinkRow = async (anchor) => {
        if (!ensureEditorApiConfigured()) {
          setStatus("Delete cancelled. API not configured.")
          return
        }

        const row = Number(anchor.dataset.sheetRow)
        const label = anchor.dataset.label || "this link"
        if (!row || !confirm(`Delete '${label}' from sheet row ${row}?`)) return

        const payload = {
          action: "delete_row",
          token: editorState.token,
          sheet: editorState.sheetName,
          row: row
        }

        setStatus("Deleting link...")
        try {
          const response = await fetch(editorState.endpoint, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          })
          const data = await response.json()
          if (!response.ok || !data.ok) {
            throw new Error(data.error || `HTTP ${response.status}`)
          }
          const item = anchor.closest(".Nav")
          if (item) item.remove()
          setStatus("Link deleted from Google Sheet.")
          reloadLinksFromSheet()
        } catch (error) {
          setStatus(`Delete failed: ${error.message}`)
        }
      }

      const moveLinkRow = async (fromRow, targetRow) => {
        if (!ensureEditorApiConfigured()) {
          setStatus("Reorder cancelled. API not configured.")
          return
        }

        if (!fromRow || !targetRow || fromRow === targetRow || fromRow + 1 === targetRow) return

        const payload = {
          action: "move_row",
          token: editorState.token,
          sheet: editorState.sheetName,
          row: fromRow,
          targetRow: targetRow
        }

        setStatus("Reordering links...")
        try {
          await callEditorApi(payload)
          setStatus("Link order updated.")
          reloadLinksFromSheet()
        } catch (error) {
          setStatus(`Reorder failed: ${error.message}`)
        }
      }

      const addLinkRow = async () => {
        if (!ensureEditorApiConfigured()) {
          setStatus("Add cancelled. API not configured.")
          return
        }

        const label = (prompt("Button label") || "").trim()
        if (!label) return
        const hrefRaw = (prompt("Button URL", "https://") || "").trim()
        if (!hrefRaw) return
        const href = normalizeHref(hrefRaw)
        const icon = (prompt("Optional icon (ex: mdi:airplane). Leave blank for text button.", "") || "").trim()

        const payload = {
          action: "add_link",
          token: editorState.token,
          sheet: editorState.sheetName,
          label: label,
          href: href,
          icon: icon
        }

        setStatus("Adding button...")
        try {
          await callEditorApi(payload)
          setStatus("Button added.")
          reloadLinksFromSheet()
        } catch (error) {
          setStatus(`Add failed: ${error.message}`)
        }
      }

      const addSectionTitle = async (sectionEl) => {
        if (!sectionEl || !editorState.enabled) return
        if (!ensureEditorApiConfigured()) {
          setStatus("Add title cancelled. API not configured.")
          return
        }

        const title = (prompt("Section title") || "").trim()
        if (!title) return

        const breakRow = Number(sectionEl.dataset.breakRow || 0)
        const firstAnchor = sectionEl.querySelector("a.BlueBox")
        const firstRow = Number(firstAnchor?.dataset.sheetRow || 0)
        if (!breakRow && !firstRow) {
          setStatus("Could not determine where to insert title.")
          return
        }

        const payload = breakRow > 0
          ? {
              action: "set_section_title",
              token: editorState.token,
              sheet: editorState.sheetName,
              row: breakRow,
              title: title
            }
          : {
              action: "insert_section_break",
              token: editorState.token,
              sheet: editorState.sheetName,
              targetRow: firstRow,
              title: title
            }

        setStatus("Saving section title...")
        try {
          await callEditorApi(payload)
          setStatus("Section title saved.")
          reloadLinksFromSheet()
        } catch (error) {
          setStatus(`Save failed: ${error.message}`)
        }
      }

      const closeModal = () => {
        iconModal.classList.add("hidden")
      }

      const renderIconChoices = (iconIds, emptyText) => {
        if (!iconIds.length) {
          iconChoices.innerHTML = `<div class="icon-empty">${esc(emptyText || "No icons found.")}</div>`
          return
        }
        iconChoices.innerHTML = iconIds
          .map((iconId) => {
            const src = `https://api.iconify.design/${encodeURIComponent(iconId)}.svg`
            return `<button type="button" class="icon-choice" data-icon="${esc(iconId)}"><img src="${esc(src)}" alt="${esc(iconId)}" /><span>${esc(iconId)}</span></button>`
          })
          .join("")
      }

      const renderCuratedIcons = () => {
        const curated = curatedIconsBySet[selectedIconSet] || curatedIconsBySet.mdi || []
        iconSearchStatus.textContent = `Showing curated icons from ${selectedIconSet}.`
        renderIconChoices(curated, "No curated icons configured for this set.")
      }

      const searchIconify = async (rawQuery) => {
        const query = String(rawQuery || "").trim()
        if (!query) {
          renderCuratedIcons()
          return
        }

        const token = ++iconSearchToken
        let prefix = selectedIconSet
        let term = query
        const colonIndex = query.indexOf(":")
        if (colonIndex > 0) {
          const maybePrefix = query.slice(0, colonIndex).trim()
          const remainder = query.slice(colonIndex + 1).trim()
          if (maybePrefix && remainder) {
            prefix = maybePrefix
            term = remainder
          }
        }

        iconSearchStatus.textContent = `Searching ${prefix}...`
        try {
          const endpoint = `https://api.iconify.design/search?query=${encodeURIComponent(term)}&prefix=${encodeURIComponent(prefix)}&limit=80`
          const response = await fetch(endpoint)
          if (!response.ok) throw new Error(`HTTP ${response.status}`)
          const data = await response.json()
          if (token !== iconSearchToken) return
          const icons = Array.isArray(data.icons) ? data.icons : []
          iconSearchStatus.textContent = icons.length
            ? `${icons.length} result(s) in ${prefix}.`
            : `No matches found in ${prefix}.`
          renderIconChoices(icons, `No matches found in ${prefix}.`)
        } catch (_) {
          if (token !== iconSearchToken) return
          iconSearchStatus.textContent = "Search failed. Showing curated icons."
          renderCuratedIcons()
        }
      }

      const openModal = (anchor) => {
        editorState.targetAnchor = anchor
        iconModalSub.textContent = `Editing: ${anchor.dataset.label || ""}`
        iconLabelInput.value = anchor.dataset.label || ""
        iconHrefInput.value = anchor.getAttribute("href") || ""
        const currentIcon = String(anchor.dataset.icon || "").trim()
        const defaultSet = currentIcon.includes(":") ? currentIcon.split(":")[0] : "mdi"
        selectedIconSet = curatedIconsBySet[defaultSet] ? defaultSet : "mdi"
        iconSetSelect.value = selectedIconSet
        iconSearchInput.value = ""
        renderCuratedIcons()
        iconModal.classList.remove("hidden")
      }

      root.onload = (data) => {
        console.log("Root loaded: ", data)
        const rows = data.rows || []
        linksRoot.innerHTML = ""
        const parseSectionBreak = (htmlContent) => {
          const raw = String(htmlContent ?? "")
          if (!/<hr\b/i.test(raw)) return null

          const probe = document.createElement("div")
          probe.innerHTML = raw
          const hr = probe.querySelector("hr")
          if (!hr) return null

          const attrTitle = hr.getAttribute("data-title") || hr.getAttribute("title") || ""
          hr.remove()
          const textTitle = probe.textContent?.trim() || ""
          const title = (attrTitle || textTitle).trim()
          return { title }
        }

        const createSection = (title = "", breakRow = 0) => {
          const section = document.createElement("div")
          section.className = "links-section"
          section.dataset.breakRow = String(breakRow || 0)
          const safeTitle = esc(title)
          if (safeTitle) {
            section.innerHTML = `<div class="section-title">${safeTitle}</div><div class="links"></div>`
          } else {
            section.innerHTML = `<button type="button" class="add-section-title-btn editor-btn">+ Title Bar</button><div class="links"></div>`
          }
          linksRoot.appendChild(section)
          return section.querySelector(".links")
        }

        let linksEl = createSection()
        rows.forEach((row, idx) => {
          const label = row.c[0]?.v
          const content = row.c[1]?.v
          const icon = row.c[2]?.v
          const sheetRow = idx + 1
          if (!label || !content) return
          if (label === "HTML") {
            const sectionBreak = parseSectionBreak(content)
            if (sectionBreak) {
              linksEl = createSection(sectionBreak.title, sheetRow)
              return
            }
            linksEl.insertAdjacentHTML("beforeend", `${content}`)
          } else {
            const iconMarkup = iconMarkupFor(icon, label)
            const hasIcon = iconMarkup.length > 0
            const anchorClass = hasIcon ? "active BlueBox icon-only" : "active BlueBox"
            const anchorStyle = hasIcon ? iconAnchorStyle : ""
            const anchorText = hasIcon ? iconMarkup : esc(label)
            linksEl.insertAdjacentHTML(
              "beforeend",
              `<span class="Nav"><a class="${anchorClass}" style="${anchorStyle}" href="${esc(content)}" title="${esc(label)}" aria-label="${esc(label)}" data-sheet-row="${sheetRow}" data-label="${esc(label)}" data-icon="${esc(icon || "")}">${anchorText}</a><button type="button" class="delete-link-btn" title="Delete link" aria-label="Delete link" data-sheet-row="${sheetRow}">-</button></span>`
            )
          }
        })

        Array.from(linksRoot.querySelectorAll(".links-section")).forEach((section) => {
          const linksInSection = section.querySelector(".links")
          const titleEl = section.querySelector(".section-title")
          if (!linksInSection || (linksInSection.children.length === 0 && !titleEl)) {
            section.remove()
          }
        })
        setDraggableState()
      }

      editModeToggle.addEventListener("click", () => {
        setEditMode(!editorState.enabled)
      })

      editorConfigBtn.addEventListener("click", configureEditorApi)
      addLinkBtn.addEventListener("click", addLinkRow)
      iconCancelBtn.addEventListener("click", closeModal)
      iconClearBtn.addEventListener("click", async () => {
        if (!editorState.targetAnchor) return
        await saveIconToSheet(editorState.targetAnchor, "")
        closeModal()
      })

      iconChoices.addEventListener("click", async (event) => {
        const button = event.target.closest(".icon-choice")
        if (!button || !editorState.targetAnchor) return
        await saveIconToSheet(editorState.targetAnchor, button.dataset.icon || "")
        closeModal()
      })
      iconSaveLabelBtn.addEventListener("click", async () => {
        if (!editorState.targetAnchor) return
        await saveLabelToSheet(editorState.targetAnchor, iconLabelInput.value)
      })
      iconLabelInput.addEventListener("keydown", async (event) => {
        if (event.key !== "Enter") return
        event.preventDefault()
        if (!editorState.targetAnchor) return
        await saveLabelToSheet(editorState.targetAnchor, iconLabelInput.value)
      })
      iconSaveHrefBtn.addEventListener("click", async () => {
        if (!editorState.targetAnchor) return
        await saveHrefToSheet(editorState.targetAnchor, iconHrefInput.value)
      })
      iconHrefInput.addEventListener("keydown", async (event) => {
        if (event.key !== "Enter") return
        event.preventDefault()
        if (!editorState.targetAnchor) return
        await saveHrefToSheet(editorState.targetAnchor, iconHrefInput.value)
      })
      iconSearchInput.addEventListener("input", (event) => {
        if (iconSearchTimer) clearTimeout(iconSearchTimer)
        iconSearchTimer = setTimeout(() => {
          searchIconify(event.target.value)
        }, 250)
      })
      iconSetSelect.addEventListener("change", (event) => {
        selectedIconSet = event.target.value || "mdi"
        if (iconSearchInput.value.trim()) {
          searchIconify(iconSearchInput.value)
        } else {
          renderCuratedIcons()
        }
      })

      linksRoot.addEventListener("click", (event) => {
        if (editorState.enabled && Date.now() < suppressEditClickUntil) {
          event.preventDefault()
          return
        }

        const addTitleBtn = event.target.closest(".add-section-title-btn")
        if (addTitleBtn && editorState.enabled) {
          event.preventDefault()
          event.stopPropagation()
          const section = addTitleBtn.closest(".links-section")
          if (section) addSectionTitle(section)
          return
        }

        const deleteBtn = event.target.closest(".delete-link-btn")
        if (deleteBtn && editorState.enabled) {
          event.preventDefault()
          event.stopPropagation()
          const navItem = deleteBtn.closest(".Nav")
          const anchor = navItem ? navItem.querySelector("a.BlueBox") : null
          if (anchor) deleteLinkRow(anchor)
          return
        }

        const anchor = event.target.closest("a.BlueBox")
        if (!anchor || !editorState.enabled) return
        event.preventDefault()
        openModal(anchor)
      })

      linksRoot.addEventListener("pointerdown", (event) => {
        if (editorState.enabled) {
          const nav = event.target.closest(".Nav")
          if (!nav) return
          if (event.pointerType !== "touch" && event.pointerType !== "pen") return
          touchDragPointerId = event.pointerId
          touchDraggedNav = nav
          touchDragStartX = event.clientX
          touchDragStartY = event.clientY
          touchDragStarted = false
          return
        }

        const anchor = event.target.closest("a.BlueBox")
        if (!anchor) return
        if (event.pointerType === "mouse" && event.button !== 0) return
        longPressStartX = event.clientX
        longPressStartY = event.clientY
        clearLongPressTimer()
        longPressTimer = setTimeout(() => {
          setEditMode(true)
          suppressEditClickUntil = Date.now() + 550
        }, LONG_PRESS_MS)
      })

      linksRoot.addEventListener("pointermove", (event) => {
        if (editorState.enabled && touchDraggedNav && event.pointerId === touchDragPointerId) {
          const movedX = Math.abs(event.clientX - touchDragStartX)
          const movedY = Math.abs(event.clientY - touchDragStartY)
          if (!touchDragStarted && (movedX > TOUCH_DRAG_THRESHOLD || movedY > TOUCH_DRAG_THRESHOLD)) {
            touchDragStarted = true
            touchDraggedNav.classList.add("dragging")
          }
          if (touchDragStarted) {
            event.preventDefault()
            const hoverEl = document.elementFromPoint(event.clientX, event.clientY)
            const hoverNav = hoverEl ? hoverEl.closest(".Nav") : null
            if (hoverNav && hoverNav !== touchDraggedNav) {
              if (dropTargetNav && dropTargetNav !== hoverNav) {
                dropTargetNav.classList.remove("drop-target")
              }
              dropTargetNav = hoverNav
              hoverNav.classList.add("drop-target")
            }
          }
          return
        }

        if (!longPressTimer) return
        const movedX = Math.abs(event.clientX - longPressStartX)
        const movedY = Math.abs(event.clientY - longPressStartY)
        if (movedX > LONG_PRESS_MOVE_THRESHOLD || movedY > LONG_PRESS_MOVE_THRESHOLD) {
          clearLongPressTimer()
        }
      })

      const cancelLongPress = () => {
        clearLongPressTimer()
      }
      const clearTouchDrag = () => {
        if (touchDraggedNav) {
          touchDraggedNav.classList.remove("dragging")
        }
        if (dropTargetNav) {
          dropTargetNav.classList.remove("drop-target")
        }
        touchDragPointerId = null
        touchDraggedNav = null
        touchDragStarted = false
      }

      linksRoot.addEventListener("pointerup", (event) => {
        cancelLongPress()
        if (!editorState.enabled || !touchDraggedNav || event.pointerId !== touchDragPointerId) return
        if (touchDragStarted && dropTargetNav && dropTargetNav !== touchDraggedNav) {
          const draggedAnchor = touchDraggedNav.querySelector("a.BlueBox")
          const nextNav = dropTargetNav.nextElementSibling
          const targetAnchor = nextNav?.matches(".Nav")
            ? nextNav.querySelector("a.BlueBox")
            : dropTargetNav.querySelector("a.BlueBox")
          const fromRow = Number(draggedAnchor?.dataset.sheetRow || 0)
          const targetRow = Number(targetAnchor?.dataset.sheetRow || 0)
          suppressEditClickUntil = Date.now() + 450
          moveLinkRow(fromRow, targetRow)
        }
        clearTouchDrag()
      })
      linksRoot.addEventListener("pointercancel", () => {
        cancelLongPress()
        clearTouchDrag()
      })
      linksRoot.addEventListener("pointerleave", cancelLongPress)

      linksRoot.addEventListener("dragstart", (event) => {
        if (!editorState.enabled) return
        const item = event.target.closest(".Nav")
        if (!item) return
        draggedNav = item
        item.classList.add("dragging")
        if (event.dataTransfer) {
          event.dataTransfer.effectAllowed = "move"
          event.dataTransfer.setData("text/plain", item.querySelector("a.BlueBox")?.dataset.sheetRow || "")
        }
      })

      linksRoot.addEventListener("dragover", (event) => {
        if (!editorState.enabled || !draggedNav) return
        const item = event.target.closest(".Nav")
        if (!item || item === draggedNav) return
        event.preventDefault()
        if (dropTargetNav && dropTargetNav !== item) {
          dropTargetNav.classList.remove("drop-target")
        }
        dropTargetNav = item
        item.classList.add("drop-target")
        if (event.dataTransfer) {
          event.dataTransfer.dropEffect = "move"
        }
      })

      linksRoot.addEventListener("drop", (event) => {
        if (!editorState.enabled || !draggedNav) return
        event.preventDefault()
        const target = event.target.closest(".Nav") || dropTargetNav
        if (!target || target === draggedNav) return
        const draggedAnchor = draggedNav.querySelector("a.BlueBox")
        const nextNav = target.nextElementSibling
        const targetAnchor = nextNav?.matches(".Nav")
          ? nextNav.querySelector("a.BlueBox")
          : target.querySelector("a.BlueBox")
        const fromRow = Number(draggedAnchor?.dataset.sheetRow || 0)
        const targetRow = Number(targetAnchor?.dataset.sheetRow || 0)
        suppressEditClickUntil = Date.now() + 350
        moveLinkRow(fromRow, targetRow)
      })

      linksRoot.addEventListener("dragend", () => {
        if (draggedNav) {
          draggedNav.classList.remove("dragging")
        }
        if (dropTargetNav) {
          dropTargetNav.classList.remove("drop-target")
        }
        draggedNav = null
        dropTargetNav = null
      })

      iconModal.addEventListener("click", (event) => {
        if (event.target === iconModal) closeModal()
      })

      document.addEventListener("click", (event) => {
        if (!editorState.enabled) return
        if (Date.now() < suppressEditClickUntil) return
        const target = event.target
        if (!(target instanceof Element)) return
        if (target.closest("a.BlueBox")) return
        if (target.closest(".delete-link-btn")) return
        if (target.closest(".editor-bar")) return
        if (target.closest(".icon-modal")) return
        setEditMode(false)
      })
    </script>
  </center></body>
</html>
